# YOLOv8s with C2fPSA position-spatial attention in backbone
# C2fPSA replaces C2f in backbone deep layer (c1==c2 constraint satisfied)
# Head uses standard C2f for compatibility

# 类别配置（修复TypeError核心）
nc: 11
names:
  0: 0
  1: 1
  2: 2
  3: 3
  4: 4
  5: Liquid
  6: Metal
  7: Solid
  8: fire
  9: object
  10: smoke

scales:
  n: [0.33, 0.25, 1024]
  s: [0.33, 0.5, 1024]
  m: [0.67, 0.75, 768]
  l: [1.0, 1.0, 512]
  x: [1.0, 1.25, 512]

backbone:
  - [-1, 1, 'Conv', [64, 3, 2]]
  - [-1, 1, 'Conv', [128, 3, 2]]
  - [-1, 3, 'C2f', [128, True]]
  - [-1, 1, 'Conv', [256, 3, 2]]
  - [-1, 6, 'C2f', [256, True]]
  - [-1, 1, 'Conv', [512, 3, 2]]
  - [-1, 6, 'C2fPSA', [512]]            # ← C2fPSA at 512-ch level
  - [-1, 1, 'Conv', [1024, 3, 2]]
  - [-1, 3, 'C2f', [1024, True]]
  - [-1, 1, 'SPPF', [1024, 5]]

head:
  - [-1, 1, 'nn.Upsample', [None, 2, 'nearest']]
  - [[-1, 6], 1, 'Concat', [1]]
  - [-1, 3, 'C2f', [512]]
  - [-1, 1, 'nn.Upsample', [None, 2, 'nearest']]
  - [[-1, 4], 1, 'Concat', [1]]
  - [-1, 3, 'C2f', [256]]
  - [-1, 1, 'Conv', [256, 3, 2]]
  - [[-1, 12], 1, 'Concat', [1]]
  - [-1, 3, 'C2f', [512]]
  - [-1, 1, 'Conv', [512, 3, 2]]
  - [[-1, 9], 1, 'Concat', [1]]
  - [-1, 3, 'C2f', [1024, True]]
  - [[15, 18, 21], 1, 'Detect', ['nc']]